<div class="dialog">
  <h4>Combine Tool &amp; Bonus</h4>
  <div class="dialog-body">
    <div (click)="doSwap()" tabindex="0">
      <div class="item-container" aria-hidden="true">
        <img [src]="'/assets/images/items/' + tool.item.image + '.svg'" class="tool" alt="" />
        <img [src]="'/assets/images/items/' + bonus.item.image + '.svg'" class="bonus" alt="" />
      </div>
      <p>The {{ tool.item.name }} will be given the {{ bonus.item.enchants.name }} bonus.</p>
      <button type="button" class="swap link-text">Switch the tool and bonus</button>
    </div>
    <hr>
    <p class="buttons">
      <button type="button" (click)="doCancel()">Never mind</button>
      <button type="button" (click)="doConfirm()">Combine!</button>
    </p>
  </div>
</div>
