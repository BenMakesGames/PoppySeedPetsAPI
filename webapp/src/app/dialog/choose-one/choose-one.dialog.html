<div class="dialog">
  <h4>{{ title }}</h4>
  <div class="dialog-body">
    <markdown [data]="description" />
    <p class="buttons" style="margin-top:0.5rem;">
      @for(choice of choices; track $index)
      {
        <button type="button" (click)="doSelect(choice)">{{ choice.label }}</button>
      }
    </p>
  </div>
</div>
