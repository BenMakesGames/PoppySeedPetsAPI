<div class="dialog">
  <h4>There's an Update Available!</h4>
  <div class="dialog-body">
    <p>Poppyseed Pets has an update. If you don't update now, you may experience odd behavior. But if you're in the middle of something, and want to finish up, I totally understand.</p>
    <p class="buttons">
      <button type="button" (click)="doUpdateToLatest()">Update Now</button>
      <button type="button" (click)="doAskMeLater()">Ask Me Again, Later</button>
    </p>
  </div>
</div>
