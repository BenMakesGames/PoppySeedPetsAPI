<div class="dialog">
  <h4>Create Bid</h4>
  <div class="dialog-body">
    <form (submit)="doCreateBid()" [class.disabled]="!createBidSubscription.closed">
      <p>
        <app-find-item-by-name [(value)]="item" />
      </p>
      <p>
        <label for="quantity">Quantity</label>
        <input type="number" name="quantity" id="quantity" min="1" step="1" [(ngModel)]="quantity">
      </p>
      <p>
        <label for="price">Price per Item</label>
        <input type="number" name="price" id="price" min="2" step="1" [(ngModel)]="price"><i class="moneys" title="moneys"></i>
      </p>
      @if(user|hasUnlockedFeature:'Basement')
      {
        <p>
          <label for="location">Purchased Item Goes...</label>
          <select id="location" name="location" [(ngModel)]="location">
            <option [ngValue]="0">Home</option>
            <option [ngValue]="1">Basement</option>
          </select>
        </p>
      }
      <p class="buttons">
        <button type="submit" [class.disabled]="!item || !price || !quantity">Create</button>
        <button type="button" class="wire" (click)="doClose()">Cancel</button>
      </p>
    </form>
  </div>
</div>
