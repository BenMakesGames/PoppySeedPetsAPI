<div class="dialog">
  <h4>
    {{ article.id ? 'Editing' : 'Creating' }} Article
    @if(saving)
    {
      <app-loading-throbber text="" />
    }
  </h4>
  <div class="dialog-body">
    @if(!article)
    {
      <p><app-loading-throbber/></p>
    }
    @else if(designGoals)
    {
      <form (submit)="doSave()" [class.disabled]="saving">
        <p>
          <label>ID</label>
          <span>{{ article.id ? article.id : '?' }}</span>
        </p>
        <app-form-field label="Image" labels="image" [value]="article.imageUrl" [maxLength]="50">
          <input type="text" name="image" id="image" [(ngModel)]="article.imageUrl" maxlength="50" />
        </app-form-field>
        <app-form-field label="Title" labels="title" [value]="article.title" [maxLength]="255">
          <input type="text" name="title" id="title" [(ngModel)]="article.title" maxlength="255" />
        </app-form-field>
        <app-form-field label="Body" labels="body" [value]="article.body">
          <textarea name="body" id="body" [(ngModel)]="article.body"></textarea>
        </app-form-field>
        <p>
          <label>Design Goals</label>
          @for(designGoal of designGoals; track designGoal.id)
          {
            <label [for]="'designGoal' + designGoal.id" class="radio-checkbox">
              <input [id]="'designGoal' + designGoal.id" type="checkbox" name="designGoals" [checked]="designGoal.id|inArray:articleDesignGoalIds" [value]="designGoal" (change)="doToggleDesignGoal(designGoal)" />
              <span>{{ designGoal.name }}</span>
            </label>
          }
        </p>
        <p>
          <label>Preview</label>
          @if(article.imageUrl)
          {
            <img [src]="'/assets/images/news/' + article.imageUrl + '.png'" style="border-radius:0.5em;max-width:100%;display:block;" alt="" />
          }
          <markdown [data]="article.body" />
        </p>
        <div class="buttons">
          <button type="submit">{{ article.id ? 'Update' : 'Create' }}</button>
          <button type="button" class="wire" (click)="doClose()">Cancel</button>
        </div>
      </form>
    }
  </div>
</div>
