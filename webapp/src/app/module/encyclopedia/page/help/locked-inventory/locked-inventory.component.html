  <h2><a [routerLink]="[ '/poppyopedia' ]">Poppyopedia</a> » <a [routerLink]="[ '/poppyopedia/help' ]">Glossary</a> » Locked Inventory</h2>
  <p>Some inventory items may be locked to your account. They will appear with a <img src="/assets/images/ui/locked.svg" alt="locked to account" style="width:1em;"> symbol on them.</p>
  <p>Locked inventory cannot be listed on the Market, and, when Recycled, has no chance of being picked up by another player's pets.</p>
</main>
