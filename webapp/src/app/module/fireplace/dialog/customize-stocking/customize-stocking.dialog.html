<div class="dialog">
  <h4>Customize Stocking</h4>
  <div class="dialog-body">
    <div [class.disabled]="!stockingSubscription.closed">
      <p>
        <label>Appearance</label>
        @for(stockingImage of AVAILABLE_STOCKINGS; track stockingImage)
        {
          <button class="link-text" type="button" (click)="doSelectAppearance(stockingImage)"><app-image [path]="'stockings/' + stockingImage" [colors]="{ colorA: stocking.colorA, colorB: stocking.colorB }" width="1in" height="0.6in" [class.selected]="stockingImage === stocking.appearance" /></button>
        }
      </p>
      <p>
        <label>Colors</label>
        <app-choose-two-colors [(colorA)]="stocking.colorA" [(colorB)]="stocking.colorB" />
      </p>
      <p class="buttons">
        <button type="button" (click)="doSave()">Perfect!</button>
        <button type="button" (click)="doCancel()">Never mind!</button>
      </p>
    </div>
  </div>
</div>
