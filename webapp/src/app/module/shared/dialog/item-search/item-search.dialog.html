<div class="dialog">
  <h4>Filter</h4>
  <div class="dialog-body">
    <form (submit)="doSearch()">
      @if(isOctober)
      {
        <p>
          <label>🎃 Halloween Candy</label>
          <app-input-yes-no-both [(value)]="filter.candy" (valueChange)="doChange()" />
        </p>
      }
      <p>
        <label>Edible</label>
        <app-input-yes-no-both [(value)]="filter.edible" (valueChange)="doChange()" />
      </p>
      @if(filter.edible)
      {
        <p>
          <label>Required Food Flavors</label>
          <span class="selection-grid">
            @for(flavor of foodFlavors; track flavor)
            {
              <label class="radio-checkbox"><input name="foodFlavors" type="checkbox" [checked]="flavor|inArray:filter.foodFlavors" [value]="flavor" (change)="doChangeFilterArray($event)"> {{ flavor|titlecase }}</label>
            }
          </span>
        </p>
      }
      <p>
        <label>Spice</label>
        <app-input-yes-no-both [(value)]="filter.spice" (valueChange)="doChange()" />
      </p>
      <p>
        <label>Tool</label>
        <app-input-yes-no-both [(value)]="filter.equipable" (valueChange)="doChange()" />
      </p>
      @if(filter.equipable)
      {
        <p>
          <label>Required Tool Effects</label>
          <span class="selection-grid">
            @for(stat of equipStats; track stat)
            {
              <label class="radio-checkbox"><input name="equipStats" type="checkbox" [checked]="stat|inArray:filter.equipStats" [value]="stat" (change)="doChangeFilterArray($event)"> {{ stat|skillName }}</label>
            }
          </span>
        </p>
      }
      <p>
        <label>Tool Bonus</label>
        <app-input-yes-no-both [(value)]="filter.bonus" (valueChange)="doChange()" />
      </p>
      <p>
        <i class="{{ itemOtherPropertiesIcons.Recyclable }}" role="img" aria-label="recyclable"></i>
        <app-input-yes-no-both [(value)]="filter.isRecyclable" (valueChange)="doChange()" />
      </p>
      <p>
        <i class="{{ itemOtherPropertiesIcons.Flammable }}" role="img" aria-label="fire"></i>
        <app-input-yes-no-both [(value)]="filter.isFuel" (valueChange)="doChange()" />
      </p>
      <p>
        <i class="{{ itemOtherPropertiesIcons.Fertilizer }}" role="img" aria-label="poop"></i>
        <app-input-yes-no-both [(value)]="filter.isFertilizer" (valueChange)="doChange()" />
      </p>
      <p>
        <i class="{{ itemOtherPropertiesIcons.Treasure }}" role="img" aria-label="gem"></i>
        <app-input-yes-no-both [(value)]="filter.isTreasure" (valueChange)="doChange()" />
      </p>
      <p>
        <i class="{{ itemOtherPropertiesIcons.Hat }}" role="img" aria-label="hat"></i>
        <app-input-yes-no-both [(value)]="filter.aHat" (valueChange)="doChange()" />
      </p>
      @if(user|hasUnlockedFeature:'Museum')
      {
        <p>
          <label>Have I Donated?</label>
          <app-input-yes-no-both [(value)]="filter.hasDonated" (valueChange)="doChange()" />
        </p>
      }
      @if(itemTag)
      {
        <p>
          <label>Item Tag</label>
          <span class="input">
            <button (click)="doClearTag()" class="link-text"><app-pet-activity-log-tag [tag]="itemTag" /></button>
          </span>
        </p>
      }
      @else
      {
        <p>
          <label>Item Tag</label>
          <input
            type="text"
            [(ngModel)]="filter.itemGroup"
            (ngModelChange)="doChange()"
            placeholder="e.g. Fresh Fruit"
            list="item-group-list"
          />
          <datalist id="item-group-list">
            @for(group of filteredItemGroups; track group)
            {
              <option [value]="group" />
            }
          </datalist>
        </p>
      }
      <div class="buttons centered" style="margin-top:1rem">
        <button type="button" class="wire" (click)="doClose()">Cancel</button>
        <button type="submit">Search</button>
      </div>
    </form>
  </div>
</div>
