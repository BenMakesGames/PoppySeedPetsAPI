<div class="dialog">
  <h4>Filter</h4>
  <div class="dialog-body">
    <form (submit)="doSearch()">
      <p>
        <app-find-pet-species-by-name [(value)]="filter.species" />
      </p>
      <p>
        <label>Pregnant</label>
        <app-input-yes-no-both [(value)]="filter.isPregnant" />
      </p>
      <p>
        <label>Merit</label>
        <app-select-merit [(value)]="filter.merit" />
      </p>
      <p>
        <app-find-item-by-name label="Holding or Wearing" [(value)]="filter.toolOrHat" />
      </p>
      <p>
        <label>Sort by</label>
        <select name="sort-by" [(ngModel)]="filter.orderBy">
          <option value="id">Age</option>
          <option value="level">Level</option>
          <option value="name">Name</option>
          <option value="lastInteraction">Last Interaction</option>
        </select>
      </p>
      <div class="buttons centered" style="margin-top:1rem">
        <button type="button" class="wire" (click)="doClose()">Cancel</button>
        <button type="submit">Search</button>
      </div>
    </form>
  </div>
</div>
