<th>{{ name|titlecase }}</th>
<td class="number">{{ skill.base }}</td>
@if(!compact)
{
  <td class="bar"><app-stat-bar [value]="skill.base" [shineOffset]="index / 10" /></td>
  <td class="modifiers"><app-pet-skill-modifiers [skill]="skill" /></td>
}
@else
{
  <td class="bar" [class.no-base]="skill.base == 0">
    @if(skill.base > 0)
    {
      <app-stat-bar [value]="skill.base" [shineOffset]="index / 10" />
    }
    <app-pet-skill-modifiers [skill]="skill" />
  </td>
}
