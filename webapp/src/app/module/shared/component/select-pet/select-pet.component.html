<p>
  <label for="select-pet-search">Name (or part thereof)</label>
  <input #search type="text" id="select-pet-search" name="search" autocomplete="off">
</p>
@if(searching)
{
  <p><app-loading-throbber text="Searching" /></p>
}
@if(results)
{
  @if(results.length === 0)
  {
    <p>No pets with that name were found.</p>
  }
  @else
  {
    <ul class="results">
      @for(pet of pets; track pet.id)
      {
        <li [class.selected]="highlightSelected && selectedPet === pet"><button class="link-text" (click)="doSelect(pet)" [class.disabled]="isDisabled(pet)">
          @if(showLocations)
          {
            <app-svg-icon sheet="menu6" icon="{{pet.location|locationSprite}}" [title]="'Pet is at ' + pet.location" />
          }
          <app-pet-appearance [pet]="pet" size="1in" [showLunchbox]="showLunchbox" />
          {{ pet.name }}
          <small>level {{ pet.level }}</small>
        </button></li>
      }
    </ul>
  }
}
