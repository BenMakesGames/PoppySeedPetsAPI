<div class="dialog">
  <h4>Save As...</h4>
  <div class="dialog-body">
    <form (submit)="doSave()" [class.disabled]="!saveSubscription.closed">
      <p>Saved themes can be found by other players!</p>
      <p>
        <label for="theme-name"></label>
        <input type="text" name="name" id="theme-name" [(ngModel)]="name" maxlength="15">
      </p>
      <p class="buttons">
        <button type="submit" [class.disabled]="name.length === 0">Save</button>
        <button type="button" class="wire" (click)="doClose()">Cancel</button>
      </p>
    </form>
  </div>
</div>
